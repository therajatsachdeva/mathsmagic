<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Kai & Seru's Maths Magic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pastel-pink: #FFB5C2;
  --pastel-purple: #C3B1E1;
  --pastel-blue: #A8D8EA;
  --pastel-mint: #B5EAD7;
  --pastel-yellow: #FFEAA7;
  --pastel-peach: #FFDAB9;
  --pastel-lavender: #E8D5F5;
  --bg-gradient: linear-gradient(135deg, #FFF0F5 0%, #F0E6FF 30%, #E6F3FF 60%, #F0FFF0 100%);
  --card-bg: rgba(255,255,255,0.85);
  --text-dark: #4A3F6B;
  --text-medium: #7B6FA0;
  --correct-green: #7DD87D;
  --incorrect-red: #FF8B8B;
  /* Safe area for notched phones */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Quicksand', sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  color: var(--text-dark);
  overflow-x: hidden;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* Floating background - fewer on mobile for perf */
.bg-decor {
  position: fixed; pointer-events: none; z-index: 0;
  opacity: 0.10; font-size: 2.5rem;
  animation: float 8s ease-in-out infinite;
}
.bg-decor:nth-child(1) { top: 5%; left: 8%; }
.bg-decor:nth-child(2) { top: 15%; right: 10%; animation-delay: 1.5s; font-size: 2rem; }
.bg-decor:nth-child(3) { top: 40%; left: 4%; animation-delay: 3s; }
.bg-decor:nth-child(4) { top: 60%; right: 6%; animation-delay: 0.8s; font-size: 1.8rem; }
.bg-decor:nth-child(5) { top: 78%; left: 12%; animation-delay: 2s; font-size: 2.2rem; }
.bg-decor:nth-child(6) { top: 28%; left: 48%; animation-delay: 4s; font-size: 1.8rem; }

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-14px) rotate(4deg); }
  66% { transform: translateY(8px) rotate(-2deg); }
}

/* App container */
.app {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto;
  padding: 16px 14px 32px;
  min-height: 100vh; min-height: 100dvh;
}

/* Header */
.header { text-align: center; margin-bottom: 16px; animation: slideDown 0.6s ease-out; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-24px); }
  to { opacity: 1; transform: translateY(0); }
}
.header h1 {
  font-family: 'Baloo 2', cursive; font-size: clamp(1.6rem, 6vw, 2.2rem); font-weight: 800;
  background: linear-gradient(135deg, #C3B1E1, #FFB5C2, #A8D8EA);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.2; filter: drop-shadow(0 2px 4px rgba(195,177,225,0.3));
}
.header .subtitle {
  font-size: clamp(0.8rem, 2.5vw, 0.95rem); color: var(--text-medium); margin-top: 2px; font-weight: 500;
}

/* ─── WELCOME SCREEN ─── */
.welcome { text-align: center; padding: 8px 12px; animation: fadeIn 0.8s ease; }
.welcome-hero {
  position: relative; margin: 0 auto 16px;
  width: clamp(220px, 65vw, 300px); height: clamp(260px, 75vw, 360px);
}
.welcome-hero img {
  width: 100%; height: 100%; object-fit: contain;
  border-radius: 20px;
  filter: drop-shadow(0 8px 24px rgba(195,177,225,0.3));
  animation: heroFloat 4s ease-in-out infinite;
}
@keyframes heroFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.welcome-hero .sparkle {
  position: absolute; font-size: 1.4rem; animation: sparkle 2s ease-in-out infinite;
  pointer-events: none;
}
.welcome-hero .sparkle:nth-child(2) { top: 2%; right: -2%; animation-delay: 0s; }
.welcome-hero .sparkle:nth-child(3) { top: 40%; left: -6%; animation-delay: 0.7s; }
.welcome-hero .sparkle:nth-child(4) { bottom: 5%; right: 0; animation-delay: 1.4s; }
.welcome-hero .sparkle:nth-child(5) { top: 12%; left: 2%; animation-delay: 0.3s; font-size: 1rem; }
@keyframes sparkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}
.welcome h2 {
  font-family: 'Baloo 2', cursive; font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 700;
  color: var(--text-dark); margin-bottom: 8px;
}
.welcome p {
  color: var(--text-medium); font-weight: 500; margin-bottom: 6px;
  line-height: 1.5; font-size: clamp(0.85rem, 2.5vw, 0.95rem);
}
.rules-box {
  background: var(--card-bg); border-radius: 16px; padding: 12px 14px;
  margin: 12px 0; text-align: left; backdrop-filter: blur(10px);
  box-shadow: 0 4px 16px rgba(195,177,225,0.12);
}
.rules-box .rule {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; font-size: clamp(0.82rem, 2.4vw, 0.9rem); font-weight: 600; color: var(--text-dark);
}
.rules-box .rule .rule-icon { font-size: 1.1rem; flex-shrink: 0; }
.start-btn {
  padding: 12px 40px; border: none; border-radius: 16px;
  background: linear-gradient(135deg, var(--pastel-purple), var(--pastel-pink));
  color: white; font-family: 'Baloo 2', cursive;
  font-size: clamp(1.1rem, 3.5vw, 1.3rem); font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 6px 20px rgba(195,177,225,0.35); margin-top: 6px;
  touch-action: manipulation;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(195,177,225,0.45); }
.start-btn:active { transform: translateY(0); }

/* ─── SCORE BAR ─── */
.score-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card-bg); border-radius: 16px; padding: 10px 14px;
  margin-bottom: 12px; backdrop-filter: blur(10px);
  box-shadow: 0 4px 16px rgba(195,177,225,0.12);
  animation: fadeIn 0.6s ease-out 0.2s both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.score-item { display: flex; align-items: center; gap: 5px; font-weight: 600; font-size: clamp(0.85rem, 2.5vw, 0.95rem); }
.score-item .icon { font-size: 1.1rem; }
.score-item .label { color: var(--text-medium); font-size: 0.7rem; }
.streak-badge {
  background: linear-gradient(135deg, var(--pastel-yellow), var(--pastel-peach));
  padding: 3px 10px; border-radius: 16px; font-size: 0.82rem; font-weight: 700;
  display: flex; align-items: center; gap: 3px; transition: transform 0.3s;
}
.streak-badge.pulse { animation: pulse 0.4s ease; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

/* ─── QUESTION PROGRESS ─── */
.question-progress { margin-bottom: 10px; animation: fadeIn 0.6s ease-out 0.25s both; }
.question-progress-label {
  display: flex; justify-content: space-between; font-size: clamp(0.72rem, 2.2vw, 0.8rem);
  font-weight: 600; color: var(--text-medium); margin-bottom: 4px;
}
.question-progress-track {
  height: 8px; background: rgba(195,177,225,0.12); border-radius: 6px;
  overflow: hidden; display: flex; gap: 1.5px;
}
.q-dot {
  flex: 1; border-radius: 6px; transition: background 0.4s;
  background: rgba(195,177,225,0.15);
}
.q-dot.correct { background: var(--correct-green); }
.q-dot.incorrect { background: var(--incorrect-red); }
.q-dot.current { background: var(--pastel-purple); animation: pulse 1s ease infinite; }

/* ─── STICKER PROGRESS ─── */
.progress-section { margin-bottom: 10px; animation: fadeIn 0.6s ease-out 0.3s both; }
.progress-label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: clamp(0.75rem, 2.2vw, 0.82rem); font-weight: 600; color: var(--text-medium); margin-bottom: 4px;
}
.progress-track {
  height: 10px; background: rgba(195,177,225,0.15); border-radius: 8px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(90deg, var(--pastel-purple), var(--pastel-pink), var(--pastel-blue));
  background-size: 200% 100%; animation: shimmer 3s ease infinite;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ─── STICKER COLLECTION ─── */
.sticker-collection {
  display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 12px; min-height: 38px; animation: fadeIn 0.6s ease-out 0.35s both;
}
.sticker-slot {
  width: 38px; height: 38px; border-radius: 10px;
  background: rgba(195,177,225,0.1); border: 2px dashed rgba(195,177,225,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; transition: all 0.3s;
}
.sticker-slot.earned {
  border: 2px solid rgba(195,177,225,0.3); background: var(--card-bg);
  box-shadow: 0 2px 8px rgba(195,177,225,0.2);
  animation: stickerPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes stickerPop {
  0% { transform: scale(0) rotate(-20deg); }
  60% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* ─── DIFFICULTY ─── */
.difficulty-bar {
  display: flex; gap: 6px; justify-content: center; margin-bottom: 10px;
  animation: fadeIn 0.6s ease-out 0.28s both;
}
.diff-btn {
  padding: 4px 12px; border: 2px solid rgba(195,177,225,0.25); border-radius: 10px;
  background: transparent; font-family: 'Quicksand', sans-serif;
  font-size: clamp(0.72rem, 2.2vw, 0.8rem); font-weight: 600; color: var(--text-medium);
  cursor: pointer; transition: all 0.3s; touch-action: manipulation;
}
.diff-btn.active {
  background: linear-gradient(135deg, var(--pastel-lavender), var(--pastel-pink));
  border-color: transparent; color: var(--text-dark);
  box-shadow: 0 2px 8px rgba(195,177,225,0.25);
}

/* ─── PROBLEM CARD ─── */
.problem-card {
  background: var(--card-bg); border-radius: 24px;
  padding: clamp(20px, 5vw, 28px) clamp(16px, 4vw, 24px) clamp(18px, 4vw, 24px);
  text-align: center; backdrop-filter: blur(10px);
  box-shadow: 0 8px 28px rgba(195,177,225,0.16);
  margin-bottom: 16px; animation: fadeIn 0.6s ease-out 0.4s both;
  position: relative; overflow: hidden;
}
.problem-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--pastel-pink), var(--pastel-purple), var(--pastel-blue), var(--pastel-mint));
}
.problem-number {
  font-size: clamp(0.7rem, 2vw, 0.8rem); font-weight: 600; color: var(--text-medium);
  margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;
}
.problem-equation {
  font-family: 'Baloo 2', cursive; font-size: clamp(2.2rem, 9vw, 3.2rem); font-weight: 800;
  color: var(--text-dark); margin-bottom: 16px; line-height: 1.2;
}
.problem-equation .operator { color: var(--pastel-purple); margin: 0 6px; }
.problem-equation .equals { color: var(--pastel-pink); margin: 0 6px; }
.problem-equation .qmark {
  display: inline-block; color: var(--pastel-blue); animation: bounce 1.5s ease infinite;
}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.input-area { display: flex; gap: 10px; justify-content: center; align-items: center; }
.answer-input {
  width: 110px; height: 52px; border: 3px solid rgba(195,177,225,0.3);
  border-radius: 14px; font-family: 'Baloo 2', cursive; font-size: 1.6rem;
  font-weight: 700; text-align: center; color: var(--text-dark);
  background: rgba(255,255,255,0.7); outline: none; transition: all 0.3s;
  -moz-appearance: textfield; touch-action: manipulation;
}
.answer-input::-webkit-inner-spin-button,
.answer-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.answer-input:focus { border-color: var(--pastel-purple); box-shadow: 0 0 0 4px rgba(195,177,225,0.15); }
.answer-input.correct { border-color: var(--correct-green); background: rgba(125,216,125,0.1); }
.answer-input.incorrect { border-color: var(--incorrect-red); background: rgba(255,139,139,0.1); animation: shake 0.4s ease; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.submit-btn {
  width: 52px; height: 52px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--pastel-purple), var(--pastel-pink));
  color: white; font-size: 1.4rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; box-shadow: 0 4px 12px rgba(195,177,225,0.3);
  touch-action: manipulation;
}
.submit-btn:active { transform: scale(0.95); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.feedback {
  margin-top: 12px; font-family: 'Baloo 2', cursive;
  font-size: clamp(1rem, 3vw, 1.2rem); font-weight: 700;
  min-height: 32px; display: flex; align-items: center;
  justify-content: center; gap: 6px;
}
.feedback.correct { color: #5BB85B; }
.feedback.incorrect { color: #E07070; }
.feedback .fb-icon { font-size: 1.2rem; }

.next-btn {
  margin-top: 10px; padding: 10px 28px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--pastel-mint), var(--pastel-blue));
  color: var(--text-dark); font-family: 'Quicksand', sans-serif;
  font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(168,216,234,0.3); touch-action: manipulation;
}
.next-btn:active { transform: scale(0.97); }

/* ─── OVERLAY & MODALS ─── */
.overlay {
  position: fixed; inset: 0; background: rgba(74,63,107,0.4);
  backdrop-filter: blur(8px); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: fadeInOverlay 0.3s ease;
}
@keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
.reward-modal {
  background: white; border-radius: 28px;
  padding: clamp(24px, 6vw, 32px) clamp(18px, 5vw, 24px);
  text-align: center; max-width: 360px; width: 100%;
  box-shadow: 0 20px 60px rgba(74,63,107,0.3);
  animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modalPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.reward-modal h2 {
  font-family: 'Baloo 2', cursive; font-size: clamp(1.4rem, 4.5vw, 1.7rem); font-weight: 800;
  margin-bottom: 4px;
  background: linear-gradient(135deg, var(--pastel-purple), var(--pastel-pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.reward-modal p { color: var(--text-medium); font-weight: 500; margin-bottom: 10px; font-size: 0.9rem; }
.reward-sticker {
  font-size: 3rem; margin: 8px 0;
  animation: stickerPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
}
.reward-modal .continue-btn {
  margin-top: 10px; padding: 11px 32px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--pastel-purple), var(--pastel-pink));
  color: white; font-family: 'Quicksand', sans-serif; font-size: 0.95rem;
  font-weight: 700; cursor: pointer; touch-action: manipulation;
}

/* ─── FINAL SCREEN ─── */
.final-hero {
  position: relative; margin: 0 auto 12px;
  width: clamp(160px, 45vw, 200px); height: clamp(190px, 52vw, 240px);
}
.final-hero img {
  width: 100%; height: 100%; object-fit: contain; border-radius: 16px;
  filter: drop-shadow(0 6px 16px rgba(195,177,225,0.3));
}
.final-score {
  font-family: 'Baloo 2', cursive; font-size: clamp(2.4rem, 8vw, 3rem); font-weight: 800;
  background: linear-gradient(135deg, var(--pastel-purple), var(--pastel-pink), var(--pastel-blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin: 6px 0;
}
.final-message {
  font-family: 'Baloo 2', cursive; font-size: clamp(0.95rem, 3vw, 1.1rem); font-weight: 600;
  color: var(--text-medium); margin-bottom: 12px;
}

/* Super sticker choices */
.super-sticker-choices {
  display: flex; gap: 12px; justify-content: center; margin: 14px 0 8px;
  flex-wrap: wrap;
}
.super-sticker-option {
  width: clamp(84px, 24vw, 100px); height: clamp(84px, 24vw, 100px);
  border-radius: 20px; border: 3px solid rgba(195,177,225,0.25);
  background: rgba(255,255,255,0.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s; padding: 6px;
  touch-action: manipulation;
}
.super-sticker-option img {
  width: clamp(52px, 15vw, 64px); height: clamp(52px, 15vw, 64px);
  object-fit: contain; border-radius: 8px; transition: transform 0.3s;
}
.super-sticker-option .ss-name {
  font-family: 'Baloo 2', cursive; font-size: 0.7rem; font-weight: 700;
  color: var(--text-dark); margin-top: 2px; line-height: 1;
}
.super-sticker-option:active { transform: scale(1.06); }
.super-sticker-option.selected {
  border-color: var(--pastel-pink);
  background: linear-gradient(135deg, rgba(255,181,194,0.15), rgba(195,177,225,0.15));
  box-shadow: 0 6px 24px rgba(255,181,194,0.35); transform: scale(1.04);
}
.chosen-super-sticker {
  width: clamp(110px, 32vw, 140px); height: clamp(110px, 32vw, 140px);
  object-fit: contain; border-radius: 16px;
  margin: 10px auto; display: block;
  animation: stickerPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  filter: drop-shadow(0 6px 16px rgba(195,177,225,0.35));
}

/* Confetti */
.confetti-piece {
  position: fixed; z-index: 200; pointer-events: none;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* Toast */
.toast {
  position: fixed; top: calc(12px + var(--safe-top)); left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: white; padding: 8px 20px; border-radius: 14px;
  font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 700;
  color: var(--text-dark); box-shadow: 0 6px 20px rgba(74,63,107,0.15);
  z-index: 50; opacity: 0;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap; max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ─── SMALL PHONES (SE, etc) ─── */
@media (max-width: 380px) {
  .app { padding: 12px 10px 24px; }
  .sticker-slot { width: 32px; height: 32px; font-size: 1.1rem; border-radius: 8px; }
  .score-bar { padding: 8px 10px; border-radius: 14px; }
  .problem-card { padding: 16px 14px 16px; border-radius: 20px; }
  .answer-input { width: 96px; height: 48px; font-size: 1.4rem; }
  .submit-btn { width: 48px; height: 48px; font-size: 1.2rem; }
  .difficulty-bar { gap: 4px; }
  .diff-btn { padding: 3px 8px; font-size: 0.68rem; }
}

/* ─── TABLET / LANDSCAPE ─── */
@media (min-width: 600px) {
  .welcome-hero { width: 320px; height: 380px; }
  .super-sticker-option { width: 110px; height: 110px; }
  .super-sticker-option img { width: 72px; height: 72px; }
}

/* Prevent zoom on input focus (iOS) */
@media screen and (max-width: 768px) {
  input[type="number"] { font-size: 16px; }
}
</style>
</head>
<body>

<div class="bg-decor">✨</div>
<div class="bg-decor">🌈</div>
<div class="bg-decor">⭐</div>
<div class="bg-decor">🦄</div>
<div class="bg-decor">🧱</div>
<div class="bg-decor">🧚</div>

<div class="app" id="app"></div>

const STICKER_THEMES = {
  fairy:   ['🧚','🧚‍♀️','🦋','🌸','🪷','✨','💖','🌺','🪻','🫧'],
  unicorn: ['🦄','🌈','⭐','🪄','💜','🌟','🎀','🫶','🌙','💎'],
  kpop:    ['⚔️','🔥','🎤','💀','👹','🐉','🗡️','🎸','👾','🎵'],
  lego:    ['🧱','🏗️','🔧','🏰','🚀','🤖','🎮','🛸','⚙️','🏎️'],
};

const ENCOURAGEMENTS = [
  "You're a star! ⭐", "Brilliant! 🌟", "Keep it up! 💪",
  "Amazing work! 🎉", "Superstar! 🚀", "So clever! 🧠",
  "Wonderful! 🌈", "Fantastic! ✨", "You rock! 🎸",
  "Incredible! 💫", "Wow! 😍", "Nailed it! 🎯",
];

  "Almost! Try the next one 💪", "So close! 🌟", "Keep going! ✨",
  "You've got this! 🌈", "Nearly there! 🎯", "Don't give up! 💖",
];

let state = {
  screen: 'welcome', correct: 0, questionNum: 0, streak: 0, bestStreak: 0,
  stickers: [], superSticker: null, difficulty: 'easy',
  problem: null, feedback: null, answered: false,
  showReward: false, pendingSticker: null, results: [],
};

function getDifficultyMax() {
  return state.difficulty === 'easy' ? 20 : state.difficulty === 'medium' ? 35 : 50;
}

function generateProblem() {
  const max = getDifficultyMax();
  const isAdd = Math.random() > 0.4;
  let a, b;
  if (isAdd) {
    a = Math.floor(Math.random() * max) + 1;
    b = Math.floor(Math.random() * (max - a + 1));
  } else {
    a = Math.floor(Math.random() * max) + 1;
    b = Math.floor(Math.random() * (a + 1));
  }
  return { a, b, op: isAdd ? '+' : '−', answer: isAdd ? a + b : a - b };
}

function getRandomSticker() {
  const themes = Object.keys(STICKER_THEMES);
  const theme = themes[Math.floor(Math.random() * themes.length)];
  const arr = STICKER_THEMES[theme];
  return arr[Math.floor(Math.random() * arr.length)];
}

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function spawnConfetti(count) {
  const colors = ['#FFB5C2','#C3B1E1','#A8D8EA','#B5EAD7','#FFEAA7','#FFDAB9'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.width = (5 + Math.random() * 7) + 'px';
    el.style.height = (5 + Math.random() * 7) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

function render() {
  const app = document.getElementById('app');

  if (state.screen === 'welcome') {
    app.innerHTML = `
      <div class="header"><h1>Kai & Seru's Maths Magic</h1></div>
      <div class="welcome">
        <div class="welcome-hero">
          <img src="${HERO_IMG}" alt="Kai and Seru" />
          <span class="sparkle">✨</span>
          <span class="sparkle">🌟</span>
          <span class="sparkle">💫</span>
          <span class="sparkle">⭐</span>
        </div>
        <h2>Ready for some maths magic?</h2>
        <div class="rules-box">
          <div class="rule"><span class="rule-icon">📝</span> 25 questions — addition & subtraction</div>
          <div class="rule"><span class="rule-icon">⭐</span> Every 5 correct answers = a sticker!</div>
          <div class="rule"><span class="rule-icon">🏆</span> Finish to pick a Super Sticker!</div>
          <div class="rule"><span class="rule-icon">🔥</span> Build streaks for bonus cheers!</div>
        </div>
        <button class="start-btn" onclick="startGame()">Let's Go! ✨</button>
      </div>`;
    return;
  }

  if (state.screen === 'finished') { renderFinished(app); return; }

  const p = state.problem;
  const stickerProgress = state.correct % 5;
  const stickerPct = state.stickers.length >= 5 ? 100 : (stickerProgress / 5) * 100;
  const nextStickerIn = 5 - stickerProgress;

  let feedbackHTML = '';
  if (state.feedback) {
    feedbackHTML = '<div class="feedback ' + state.feedback.type + '">' +
      '<span class="fb-icon">' + (state.feedback.type === 'correct' ? '✅' : '❌') + '</span>' +
      state.feedback.text + '</div>';
    if (state.answered && state.feedback.type === 'incorrect') {
      feedbackHTML += '<button class="next-btn" onclick="nextProblem()">Next Question →</button>';
    }
  }

  let stickerSlots = '';
  for (let i = 0; i < 5; i++) {
    if (i < state.stickers.length) stickerSlots += '<div class="sticker-slot earned">' + state.stickers[i] + '</div>';
    else stickerSlots += '<div class="sticker-slot">?</div>';
  }

  let dotsHTML = '';
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    let cls = 'q-dot';
    if (i < state.results.length) cls += ' ' + state.results[i];
    else if (i === state.questionNum) cls += ' current';
    dotsHTML += '<div class="' + cls + '"></div>';
  }

  const qLeft = TOTAL_QUESTIONS - state.questionNum - (state.answered ? 0 : 1);

  app.innerHTML = `
    <div class="header">
      <h1>Kai & Seru's Maths Magic</h1>
      <div class="subtitle">Solve, collect, and celebrate!</div>
    </div>
    <div class="score-bar">
      <div class="score-item"><span class="icon">✅</span><span>${state.correct}<span class="label"> correct</span></span></div>
      <div class="streak-badge ${state.streak >= 3 ? 'pulse' : ''}">🔥 ${state.streak}</div>
      <div class="score-item"><span class="icon">📝</span><span>${qLeft} left</span></div>
    </div>
    <div class="question-progress">
      <div class="question-progress-label"><span>Question ${state.questionNum + 1} of ${TOTAL_QUESTIONS}</span></div>
      <div class="question-progress-track">${dotsHTML}</div>
    </div>
    <div class="difficulty-bar">
      <button class="diff-btn ${state.difficulty==='easy'?'active':''}" onclick="setDifficulty('easy')">Easy (1-20)</button>
      <button class="diff-btn ${state.difficulty==='medium'?'active':''}" onclick="setDifficulty('medium')">Medium (1-35)</button>
      <button class="diff-btn ${state.difficulty==='hard'?'active':''}" onclick="setDifficulty('hard')">Hard (1-50)</button>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span>${state.stickers.length < 5 ? 'Next sticker in ' + nextStickerIn + ' correct' : 'All stickers earned! ✨'}</span>
        <span>🎯 ${state.stickers.length}/5</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${stickerPct}%"></div></div>
    </div>
    <div class="sticker-collection">${stickerSlots}</div>
    <div class="problem-card">
      <div class="problem-number">Question ${state.questionNum + 1}</div>
      <div class="problem-equation">
        ${p.a} <span class="operator">${p.op}</span> ${p.b} <span class="equals">=</span> <span class="qmark">?</span>
      </div>
      <div class="input-area">
        <input type="number" class="answer-input ${state.feedback ? state.feedback.type : ''}"
          id="answerInput" placeholder="?"
          ${state.answered ? 'disabled' : ''}
          onkeydown="if(event.key==='Enter')checkAnswer()"
          inputmode="numeric" autocomplete="off">
        <button class="submit-btn" onclick="checkAnswer()" ${state.answered ? 'disabled' : ''}>✓</button>
      </div>
      ${feedbackHTML}
    </div>`;

  if (!state.answered) {
    setTimeout(() => { const inp = document.getElementById('answerInput'); if (inp) inp.focus(); }, 50);
  }
  if (state.showReward) renderRewardOverlay();
}

function renderFinished(app) {
  const chosen = state.superSticker;
  const pct = Math.round((state.correct / TOTAL_QUESTIONS) * 100);
  let message = '';
  if (pct === 100) message = "PERFECT SCORE! You're a maths genius! 🤩";
  else if (pct >= 80) message = "Amazing work! Kai & Seru are SO proud! 🌟";
  else if (pct >= 60) message = "Great job! You're getting really good! 💪";
  else if (pct >= 40) message = "Good effort! Practice makes perfect! 🌈";
  else message = "Keep practising — you'll get there! ✨";

  let superHTML = '';
  if (state.stickers.length > 0 && !chosen) {
    superHTML = `
      <p style="font-weight:700;margin-bottom:8px;color:var(--text-dark);font-family:'Baloo 2',cursive;font-size:clamp(1rem,3vw,1.15rem)">Choose your Super Sticker!</p>
      <div class="super-sticker-choices">
        ${SUPER_STICKERS.map((s,i) => `
          <div class="super-sticker-option" onclick="chooseSuperSticker(${i})" title="${s.label}">
            <img src="${s.img}" alt="${s.label}" />
            <span class="ss-name">${s.label}</span>
          </div>`).join('')}
      </div>`;
  } else if (chosen) {
    superHTML = `
      <img class="chosen-super-sticker" src="${chosen.img}" alt="${chosen.label}" />
      <p style="font-family:'Baloo 2',cursive;font-weight:700;color:var(--text-dark);font-size:1.1rem;margin-bottom:10px">${chosen.label}'s Super Sticker!</p>
      <button class="start-btn" style="margin-top:6px" onclick="resetGame()">Play Again! 🚀</button>`;
  } else {
    superHTML = '<button class="start-btn" style="margin-top:14px" onclick="resetGame()">Play Again! 🚀</button>';
  }

  app.innerHTML = `
    <div class="header"><h1>Kai & Seru's Maths Magic</h1></div>
    <div class="welcome">
      <div class="final-hero"><img src="${HERO_IMG}" alt="Kai and Seru" /></div>
      <h2>All Done! 🎉</h2>
      <div class="final-score">${state.correct} / ${TOTAL_QUESTIONS}</div>
      <div class="final-message">${message}</div>
      <div class="sticker-collection" style="margin:10px 0">
        ${state.stickers.map(s => '<div class="sticker-slot earned">' + s + '</div>').join('')}
        ${state.stickers.length === 0 ? '<p style="color:var(--text-medium);font-size:0.85rem">No stickers this time — try again!</p>' : ''}
      </div>
      ${superHTML}
    </div>`;
}

function renderRewardOverlay() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="reward-modal">
      <h2>Sticker Earned!</h2>
      <p>${state.stickers.length} of 5 stickers collected!</p>
      <div class="reward-sticker">${state.pendingSticker}</div>
      <button class="continue-btn" onclick="closeReward()">Keep Going! 🎉</button>
    </div>`;
  document.body.appendChild(overlay);
  spawnConfetti(30);
}

function startGame() {
  state = {
    screen: 'playing', correct: 0, questionNum: 0, streak: 0, bestStreak: 0,
    stickers: [], superSticker: null, difficulty: state.difficulty,
    problem: null, feedback: null, answered: false,
    showReward: false, pendingSticker: null, results: [],
  };
  state.problem = generateProblem();
  render();
}

function resetGame() { startGame(); }

function setDifficulty(d) {
  state.difficulty = d;
  if (!state.answered) state.problem = generateProblem();
  render();
}

function checkAnswer() {
  if (state.answered) return;
  const inp = document.getElementById('answerInput');
  if (!inp || inp.value === '') return;

  const userAns = parseInt(inp.value, 10);
  const isCorrect = userAns === state.problem.answer;

  if (isCorrect) {
    state.correct++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    state.results.push('correct');
    state.feedback = { type: 'correct', text: ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)] };

    if (state.streak === 3) showToast('🔥 3 in a row!');
    if (state.streak === 5) showToast('🔥🔥 5 streak! On fire!');
    if (state.streak === 10) showToast('🔥🔥🔥 10 streak! LEGEND!');

    if (state.correct > 0 && state.correct % 5 === 0 && state.stickers.length < 5) {
      const sticker = getRandomSticker();
      state.stickers.push(sticker);
      state.pendingSticker = sticker;
      state.showReward = true;
    }
  } else {
    state.streak = 0;
    state.results.push('incorrect');
    state.feedback = {
      type: 'incorrect',
      text: WRONG_ENCOURAGEMENTS[Math.floor(Math.random() * WRONG_ENCOURAGEMENTS.length)] + ' It was ' + state.problem.answer
    };
  }

  state.answered = true;

  if (state.questionNum >= TOTAL_QUESTIONS - 1) {
    render();
    setTimeout(() => {
      state.screen = 'finished';
      spawnConfetti(60);
      render();
    }, isCorrect ? 1000 : 2500);
    return;
  }

  render();

  if (isCorrect && !state.showReward) {
    setTimeout(() => { nextProblem(); }, 1000);
  }
}

function nextProblem() {
  state.questionNum++;
  state.problem = generateProblem();
  state.feedback = null;
  state.answered = false;
  render();
}

function closeReward() {
  state.showReward = false;
  document.querySelectorAll('.overlay').forEach(el => el.remove());
  if (state.questionNum >= TOTAL_QUESTIONS - 1) {
    state.screen = 'finished';
    spawnConfetti(60);
    render();
  } else {
    nextProblem();
  }
}

function chooseSuperSticker(index) {
  state.superSticker = SUPER_STICKERS[index];
  spawnConfetti(60);
  render();
}

render();
</script>
</body>
</html>
